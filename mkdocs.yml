site_name: NEPS WP4 Documentation
site_description: Multi-country youth psychosocial monitoring platform
repo_url: https://github.com/mhobgstudio/NEPS-WP4-Documentation-Framework
site_url: https://mhobgstudio.github.io/NEPS-WP4-Documentation-Framework

theme:
  name: material
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy

nav:
  - Home: index.md
  - Tutorials:
    - tutorials/index.md
  - How-to Guides:
    - how-to/index.md
    - Setup a country site: how-to/setup-country-site.md
  - Reference:
    - reference/index.md
    - API: reference/api/openapi.yaml
    - Glossary: reference/glossary.md
  - Explanation:
    - explanation/index.md
    - Architecture: explanation/architecture.md
  - ADRs:
    - adr/index.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
